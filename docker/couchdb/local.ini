; CouchDB 3.5 config for couch-auth-proxy integration tests / local docker compose.
; JWT secret must stay in sync with JWT_HMAC_SECRET used by tests (couch-auth-proxy-dev-secret).

[chttpd]
authentication_handlers = {chttpd_auth, jwt_authentication_handler}, {chttpd_auth, cookie_authentication_handler}, {chttpd_auth, default_authentication_handler}
enable_cors = false
; Allow non-admins to call GET /_all_dbs so the proxy can filter via restrict.*.
admin_only_all_dbs = false

[chttpd_auth]
require_valid_user = false

[jwt_auth]
; Require exp so expired tokens are rejected (Couch validates presence; jose checks value locally if used).
required_claims = exp
; Couch 3.3+ preferred path form (escape dots in claim names).
roles_claim_path = _couchdb\.roles

[jwt_keys]
; base64("couch-auth-proxy-dev-secret")
hmac:_default = Y291Y2gtYXV0aC1wcm94eS1kZXYtc2VjcmV0

[couchdb]
single_node = true
; Prefer open membership by default; couch-auth-proxy owns document ACL.
; (Explicit _security is still set in init.sh for acldemo.)
default_security = everyone

[cluster]
n = 1