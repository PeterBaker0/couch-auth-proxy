# Profiling overlay: enables request phase timers on the proxy.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.profile.yml up -d --build
#   pnpm test:perf:profile
services:
  couch-auth-proxy:
    environment:
      PROFILE: "true"
      # Optional: cut sequential /_session chatter while attributing ACL vs upstream.
      # Concurrent identical credentials already coalesce with TTL=0 (no revocation delay).
      # Enabling a TTL accepts role/admin revocation lag up to that window — see README.
      # SESSION_CACHE_TTL_MS: "5000"
      # SESSION_CACHE_MAX: "1000"
