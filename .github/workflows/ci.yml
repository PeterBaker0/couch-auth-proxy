name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions: {}

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm fmt:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  integration:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: docker compose up -d --build
      - name: Wait for couch-auth-proxy
        run: |
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:8000/_couch-auth-proxy/ready; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs
          exit 1
      - run: pnpm test:integration
      - if: always()
        run: docker compose down -v
