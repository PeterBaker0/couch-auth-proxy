services:
  couchdb:
    image: couchdb:3.5
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: password
    # Host port publish is in docker-compose.dev.yml (profile/tools).
    # Production: keep Couch on the compose network only.
    volumes:
      - ./docker/couchdb/local.ini:/couch-config/local.ini:ro
      - ./docker/couchdb/entrypoint.sh:/couch-config/entrypoint.sh:ro
      - couchdata:/opt/couchdb/data
    entrypoint: ["/bin/sh", "/couch-config/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://admin:password@localhost:5984/_up"]
      interval: 5s
      timeout: 5s
      retries: 20

  couch-auth-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      COUCH_URL: http://couchdb:5984
      COUCH_ADMIN_USER: admin
      COUCH_ADMIN_PASSWORD: password
      COUCH_PRELOAD_DBS: acldemo
      JWT_HMAC_SECRET: couch-auth-proxy-dev-secret
      AUTH_RESOLVE_VIA_COUCH_SESSION: "true"
      RATE_LIMIT_ENABLED: "false"
      TRUST_PROXY_HOPS: "0"
    ports:
      - "8000:8000"
    depends_on:
      couchdb:
        condition: service_healthy
      couch-init:
        condition: service_completed_successfully

  # One-shot helper: create demo DB + users after Couch is healthy
  couch-init:
    image: curlimages/curl:8.12.1
    depends_on:
      couchdb:
        condition: service_healthy
    volumes:
      - ./docker/couchdb/init.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "/init.sh"]
    environment:
      COUCH_URL: http://couchdb:5984
      COUCH_ADMIN_USER: admin
      COUCH_ADMIN_PASSWORD: password
      JWT_HMAC_SECRET: couch-auth-proxy-dev-secret

volumes:
  couchdata:
